<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Data Juliana</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Gerador de Data Juliana</h1>
    
    <div>
      <label><input type="checkbox" id="chk-year"> Usar ano completo (YYYY)</label><br>
      <label><input type="checkbox" id="chk-order"> Inverter ordem (Ano/Dia)</label><br>
      <label><input type="checkbox" id="chk-left-zeros" checked> Zeros à esquerda no dia</label><br>
      <label>Separador: <input alt="ex: /" type="text" id="inp-separator" value="" maxlength="1" size="2"></label>
    </div>

    <button id="btn-generate">Gerar Data</button>

    <h2>Resultado: <span id="result">---</span></h2>

    <script type="module" src="/main.js"></script>
  </body>
</html>
